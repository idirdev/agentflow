<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0c0a1d"/>
      <stop offset="1" stop-color="#1a1333"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" rx="12"/>
  <!-- Terminal window -->
  <rect x="80" y="40" width="1040" height="550" rx="12" fill="#13102a" stroke="#2d2555" stroke-width="1"/>
  <!-- Title bar -->
  <rect x="80" y="40" width="1040" height="40" rx="12" fill="#1c1838"/>
  <circle cx="108" cy="60" r="6" fill="#ff5f57"/>
  <circle cx="128" cy="60" r="6" fill="#febc2e"/>
  <circle cx="148" cy="60" r="6" fill="#28c840"/>
  <text x="600" y="65" font-family="monospace" font-size="13" fill="#8b8b9e" text-anchor="middle">agentflow run workflow.yaml</text>
  <!-- Terminal content -->
  <text x="110" y="115" font-family="monospace" font-size="14" fill="#8b5cf6" font-weight="bold">  AgentFlow - Workflow Engine</text>
  <text x="110" y="145" font-family="monospace" font-size="12" fill="#64748b">  Workflow: code-review-pipeline (3 steps)</text>
  <text x="110" y="165" font-family="monospace" font-size="12" fill="#64748b">  Agents: code-analyzer, suggestion-engine, report-writer</text>
  <text x="110" y="185" font-family="monospace" font-size="12" fill="#64748b">  Budget: $10.00</text>
  <!-- Progress -->
  <text x="110" y="225" font-family="monospace" font-size="12" fill="#a78bfa">[1/3]</text>
  <text x="160" y="225" font-family="monospace" font-size="12" fill="#e2e8f0">Running code-analyzer...</text>
  <text x="460" y="225" font-family="monospace" font-size="12" fill="#22c55e">done</text>
  <text x="500" y="225" font-family="monospace" font-size="12" fill="#64748b">(2,340 tokens, 1.2s)</text>
  <text x="110" y="250" font-family="monospace" font-size="12" fill="#a78bfa">[2/3]</text>
  <text x="160" y="250" font-family="monospace" font-size="12" fill="#e2e8f0">Running suggestion-engine...</text>
  <text x="490" y="250" font-family="monospace" font-size="12" fill="#22c55e">done</text>
  <text x="530" y="250" font-family="monospace" font-size="12" fill="#64748b">(1,856 tokens, 0.9s)</text>
  <text x="110" y="275" font-family="monospace" font-size="12" fill="#a78bfa">[3/3]</text>
  <text x="160" y="275" font-family="monospace" font-size="12" fill="#e2e8f0">Running report-writer...</text>
  <text x="440" y="275" font-family="monospace" font-size="12" fill="#22c55e">done</text>
  <text x="480" y="275" font-family="monospace" font-size="12" fill="#64748b">(1,124 tokens, 0.6s)</text>
  <!-- Results -->
  <text x="110" y="320" font-family="monospace" font-size="14" fill="white" font-weight="bold">  Results</text>
  <line x1="110" y1="332" x2="700" y2="332" stroke="#2d2555" stroke-width="1"/>
  <text x="130" y="360" font-family="monospace" font-size="13" fill="#22c55e">v</text>
  <text x="150" y="360" font-family="monospace" font-size="13" fill="#e2e8f0">analyze</text>
  <text x="350" y="360" font-family="monospace" font-size="12" fill="#64748b">(1200ms, 2340 tokens)</text>
  <text x="130" y="388" font-family="monospace" font-size="13" fill="#22c55e">v</text>
  <text x="150" y="388" font-family="monospace" font-size="13" fill="#e2e8f0">suggest</text>
  <text x="350" y="388" font-family="monospace" font-size="12" fill="#64748b">(900ms, 1856 tokens)</text>
  <text x="130" y="416" font-family="monospace" font-size="13" fill="#22c55e">v</text>
  <text x="150" y="416" font-family="monospace" font-size="13" fill="#e2e8f0">summarize</text>
  <text x="350" y="416" font-family="monospace" font-size="12" fill="#64748b">(600ms, 1124 tokens)</text>
  <line x1="110" y1="436" x2="700" y2="436" stroke="#2d2555" stroke-width="1"/>
  <text x="130" y="465" font-family="monospace" font-size="13" fill="#94a3b8">Status:</text>
  <text x="240" y="465" font-family="monospace" font-size="13" fill="#22c55e" font-weight="bold">completed</text>
  <text x="130" y="490" font-family="monospace" font-size="13" fill="#94a3b8">Tokens:</text>
  <text x="240" y="490" font-family="monospace" font-size="13" fill="white">5,320</text>
  <text x="130" y="515" font-family="monospace" font-size="13" fill="#94a3b8">Cost:</text>
  <text x="240" y="515" font-family="monospace" font-size="13" fill="white">$0.0332</text>
  <text x="130" y="540" font-family="monospace" font-size="13" fill="#94a3b8">Time:</text>
  <text x="240" y="540" font-family="monospace" font-size="13" fill="white">2,700ms</text>
  <!-- Side info panel -->
  <rect x="750" y="300" width="340" height="250" rx="10" fill="#1c1838" stroke="#2d2555" stroke-width="1"/>
  <text x="770" y="328" font-family="monospace" font-size="13" fill="#8b5cf6" font-weight="bold">Workflow DAG</text>
  <!-- DAG nodes -->
  <rect x="830" y="350" width="100" height="30" rx="6" fill="#8b5cf620" stroke="#8b5cf6" stroke-width="1"/>
  <text x="880" y="370" font-family="monospace" font-size="11" fill="#c4b5fd" text-anchor="middle">analyze</text>
  <line x1="880" y1="380" x2="840" y2="410" stroke="#8b5cf6" stroke-width="1"/>
  <line x1="880" y1="380" x2="920" y2="410" stroke="#8b5cf6" stroke-width="1"/>
  <rect x="790" y="410" width="100" height="30" rx="6" fill="#8b5cf620" stroke="#8b5cf6" stroke-width="1"/>
  <text x="840" y="430" font-family="monospace" font-size="11" fill="#c4b5fd" text-anchor="middle">suggest</text>
  <rect x="900" y="410" width="100" height="30" rx="6" fill="#8b5cf620" stroke="#8b5cf6" stroke-width="1"/>
  <text x="950" y="430" font-family="monospace" font-size="11" fill="#c4b5fd" text-anchor="middle">validate</text>
  <line x1="840" y1="440" x2="880" y2="470" stroke="#8b5cf6" stroke-width="1"/>
  <line x1="950" y1="440" x2="880" y2="470" stroke="#8b5cf6" stroke-width="1"/>
  <rect x="830" y="470" width="100" height="30" rx="6" fill="#22c55e20" stroke="#22c55e" stroke-width="1"/>
  <text x="880" y="490" font-family="monospace" font-size="11" fill="#86efac" text-anchor="middle">report</text>
</svg>
