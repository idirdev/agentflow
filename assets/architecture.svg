<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none">
  <rect width="1200" height="600" fill="#0f0f14" rx="12"/>
  <text x="600" y="40" font-family="monospace" font-size="16" fill="#8b5cf6" text-anchor="middle" font-weight="bold">AGENTFLOW ARCHITECTURE</text>
  <text x="600" y="60" font-family="monospace" font-size="11" fill="#6b7280" text-anchor="middle">Multi-step AI workflow orchestration engine</text>

  <!-- CLI Layer -->
  <rect x="60" y="85" width="250" height="80" rx="10" fill="#1a1a22" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="185" y="110" font-family="monospace" font-size="13" fill="#8b5cf6" text-anchor="middle" font-weight="bold">CLI</text>
  <text x="185" y="130" font-family="monospace" font-size="11" fill="#d1d5db" text-anchor="middle">agentflow run &lt;workflow&gt;</text>
  <text x="185" y="148" font-family="monospace" font-size="11" fill="#d1d5db" text-anchor="middle">agentflow list | inspect</text>

  <!-- SDK Layer -->
  <rect x="340" y="85" width="250" height="80" rx="10" fill="#1a1a22" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="465" y="110" font-family="monospace" font-size="13" fill="#8b5cf6" text-anchor="middle" font-weight="bold">SDK</text>
  <text x="465" y="130" font-family="monospace" font-size="11" fill="#d1d5db" text-anchor="middle">import { WorkflowEngine }</text>
  <text x="465" y="148" font-family="monospace" font-size="11" fill="#d1d5db" text-anchor="middle">engine.execute(config)</text>

  <!-- YAML Config -->
  <rect x="620" y="85" width="250" height="80" rx="10" fill="#1a1a22" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="745" y="110" font-family="monospace" font-size="13" fill="#f59e0b" text-anchor="middle" font-weight="bold">YAML Workflows</text>
  <text x="745" y="130" font-family="monospace" font-size="11" fill="#d1d5db" text-anchor="middle">steps, dependencies</text>
  <text x="745" y="148" font-family="monospace" font-size="11" fill="#d1d5db" text-anchor="middle">conditions, retries</text>

  <!-- Arrows down -->
  <path d="M185,165 L185,195" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M465,165 L465,195" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M745,165 L600,195" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" fill="#6b7280">
      <polygon points="0 0, 8 3, 0 6"/>
    </marker>
  </defs>

  <!-- Core Engine -->
  <rect x="200" y="200" width="500" height="100" rx="12" fill="#1a1a22" stroke="#10b981" stroke-width="2"/>
  <text x="450" y="230" font-family="monospace" font-size="15" fill="#10b981" text-anchor="middle" font-weight="bold">Workflow Engine</text>
  <text x="280" y="258" font-family="monospace" font-size="11" fill="#d1d5db">Dependency</text>
  <text x="280" y="274" font-family="monospace" font-size="11" fill="#d1d5db">Resolution</text>
  <text x="400" y="258" font-family="monospace" font-size="11" fill="#d1d5db">Parallel</text>
  <text x="400" y="274" font-family="monospace" font-size="11" fill="#d1d5db">Execution</text>
  <text x="520" y="258" font-family="monospace" font-size="11" fill="#d1d5db">Retry</text>
  <text x="520" y="274" font-family="monospace" font-size="11" fill="#d1d5db">Logic</text>
  <text x="620" y="258" font-family="monospace" font-size="11" fill="#d1d5db">Cost</text>
  <text x="620" y="274" font-family="monospace" font-size="11" fill="#d1d5db">Budget</text>

  <!-- Arrows from engine down -->
  <path d="M300,300 L300,340" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M450,300 L450,340" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M600,300 L600,340" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Agent Runtime -->
  <rect x="200" y="345" width="180" height="80" rx="10" fill="#1a1a22" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="290" y="370" font-family="monospace" font-size="13" fill="#3b82f6" text-anchor="middle" font-weight="bold">Agent Runtime</text>
  <text x="290" y="392" font-family="monospace" font-size="11" fill="#d1d5db" text-anchor="middle">Tool calling loop</text>
  <text x="290" y="408" font-family="monospace" font-size="11" fill="#d1d5db" text-anchor="middle">Conversation state</text>

  <!-- Prompt Engine -->
  <rect x="400" y="345" width="180" height="80" rx="10" fill="#1a1a22" stroke="#ec4899" stroke-width="1.5"/>
  <text x="490" y="370" font-family="monospace" font-size="13" fill="#ec4899" text-anchor="middle" font-weight="bold">Prompt Templates</text>
  <text x="490" y="392" font-family="monospace" font-size="11" fill="#d1d5db" text-anchor="middle">Handlebars engine</text>
  <text x="490" y="408" font-family="monospace" font-size="11" fill="#d1d5db" text-anchor="middle">Variable injection</text>

  <!-- Memory Store -->
  <rect x="600" y="345" width="180" height="80" rx="10" fill="#1a1a22" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="690" y="370" font-family="monospace" font-size="13" fill="#f59e0b" text-anchor="middle" font-weight="bold">Memory Store</text>
  <text x="690" y="392" font-family="monospace" font-size="11" fill="#d1d5db" text-anchor="middle">Semantic search</text>
  <text x="690" y="408" font-family="monospace" font-size="11" fill="#d1d5db" text-anchor="middle">TTL cleanup</text>

  <!-- Bottom layer: Model Providers -->
  <path d="M290,425 L290,470" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M490,425 L490,470" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Model Router -->
  <rect x="200" y="475" width="380" height="80" rx="10" fill="#1a1a22" stroke="#6b7280" stroke-width="1.5"/>
  <text x="390" y="500" font-family="monospace" font-size="13" fill="#e5e7eb" text-anchor="middle" font-weight="bold">Model Router</text>

  <!-- OpenAI -->
  <rect x="230" y="515" width="100" height="28" rx="6" fill="#10b98120" stroke="#10b981" stroke-width="1"/>
  <text x="280" y="533" font-family="monospace" font-size="11" fill="#10b981" text-anchor="middle">OpenAI</text>

  <!-- Anthropic -->
  <rect x="350" y="515" width="100" height="28" rx="6" fill="#f59e0b20" stroke="#f59e0b" stroke-width="1"/>
  <text x="400" y="533" font-family="monospace" font-size="11" fill="#f59e0b" text-anchor="middle">Anthropic</text>

  <!-- More -->
  <rect x="470" y="515" width="80" height="28" rx="6" fill="#6b728020" stroke="#6b7280" stroke-width="1"/>
  <text x="510" y="533" font-family="monospace" font-size="11" fill="#6b7280" text-anchor="middle">+ more</text>

  <!-- Tools panel on right -->
  <rect x="830" y="200" width="310" height="355" rx="12" fill="#1a1a22" stroke="#2a2a35" stroke-width="1"/>
  <text x="985" y="230" font-family="monospace" font-size="13" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Built-in Tools</text>

  <text x="860" y="260" font-family="monospace" font-size="11" fill="#10b981">read_file</text>
  <text x="970" y="260" font-family="monospace" font-size="11" fill="#6b7280">Read source files</text>
  <text x="860" y="285" font-family="monospace" font-size="11" fill="#10b981">write_file</text>
  <text x="970" y="285" font-family="monospace" font-size="11" fill="#6b7280">Write output files</text>
  <text x="860" y="310" font-family="monospace" font-size="11" fill="#10b981">search</text>
  <text x="970" y="310" font-family="monospace" font-size="11" fill="#6b7280">Regex code search</text>
  <text x="860" y="335" font-family="monospace" font-size="11" fill="#10b981">http_request</text>
  <text x="970" y="335" font-family="monospace" font-size="11" fill="#6b7280">External API calls</text>
  <text x="860" y="360" font-family="monospace" font-size="11" fill="#10b981">json_parse</text>
  <text x="970" y="360" font-family="monospace" font-size="11" fill="#6b7280">Structure extraction</text>
  <text x="860" y="385" font-family="monospace" font-size="11" fill="#10b981">shell_exec</text>
  <text x="970" y="385" font-family="monospace" font-size="11" fill="#6b7280">Run shell commands</text>

  <line x1="850" y1="405" x2="1120" y2="405" stroke="#2a2a35" stroke-width="1"/>

  <text x="985" y="430" font-family="monospace" font-size="13" fill="#ec4899" text-anchor="middle" font-weight="bold">Output Parsers</text>
  <text x="860" y="458" font-family="monospace" font-size="11" fill="#d1d5db">JSON · Lists · Tables · Code</text>
  <text x="860" y="478" font-family="monospace" font-size="11" fill="#6b7280">Structured output extraction</text>

  <line x1="850" y1="498" x2="1120" y2="498" stroke="#2a2a35" stroke-width="1"/>

  <text x="985" y="524" font-family="monospace" font-size="13" fill="#3b82f6" text-anchor="middle" font-weight="bold">Cost Tracking</text>
  <text x="860" y="546" font-family="monospace" font-size="11" fill="#d1d5db">Per-step token counts + costs</text>
</svg>